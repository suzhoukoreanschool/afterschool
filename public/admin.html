<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>방과후 시스템 관리자 페이지</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        h1, h2 { color: #1e3a8a; }
        .admin-section { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        input[type="text"], input[type="datetime-local"], select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input[type="text"], input[type="datetime-local"] { width: 100%; }
        .class-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 5px; }
        .class-row input, .class-row select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #1e3a8a; color: white; border: none; padding: 12px 20px; font-size: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #172554; }
        .add-btn { background-color: #10b981; }
        .add-btn:hover { background-color: #059669; }
        .remove-btn { background-color: #ef4444; padding: 8px 12px; }
        .remove-btn:hover { background-color: #dc2626; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f1f5f9; color: #1e3a8a; }
    </style>
</head>
<body>

    <h1>🛠️ 방과후 학교 관리자 시스템</h1>
    <p>강좌 정보 설정, 신청 시간 통제, 신청 현황 확인을 관리합니다.</p>

    <div class="admin-section">
        <h2>🏷️ 메인 화면 제목 설정</h2>
        <label>대제목 (학교명 또는 소속)</label>
        <input type="text" id="mainTitle">
        <label>소제목 (학기 정보 및 안내)</label>
        <input type="text" id="subTitle">
    </div>

    <div class="admin-section">
        <h2>⏰ 수강 신청 기간 설정</h2>
        <label>신청 시작 시간</label>
        <input type="datetime-local" id="startTime">
        <label>신청 마감 시간</label>
        <input type="datetime-local" id="endTime">
    </div>

    <div class="admin-section">
        <h2>📚 방과후 강좌 구성 변경</h2>
        <div id="classContainer"></div>
        <button type="button" class="add-btn" id="addClassBtn">➕ 강좌 추가</button>
    </div>

    <div style="text-align: center; margin-bottom: 40px;">
        <button id="saveAllBtn" style="background-color: #2563eb; font-size: 18px; padding: 15px 40px; border-radius: 30px; box-shadow: 0 4px 10px rgba(37,99,235,0.3);">
            💾 위 시스템 설정 일괄 반영하기
        </button>
    </div>

    <div class="admin-section">
        <h2>📊 전체 학생 수강 신청 결과 명단</h2>
        <button id="refreshListBtn" style="background-color: #475569;">🔄 명단 실시간 새로고침</button>
        <button id="downloadExcelBtn" style="background-color: #047857; margin-left: 10px;">📥 엑셀(CSV) 결과 다운로드</button>
        <table>
            <thead>
                <tr>
                    <th>학년반</th>
                    <th>이름</th>
                    <th>신청 강좌</th>
                    <th>신청 시각</th>
                </tr>
            </thead>
            <tbody id="studentListTableBody">
                <tr><td colspan="4" style="text-align: center; color: #999;">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="admin-section" style="border: 1px solid #ff4d4d; background-color: #fff5f5; padding: 20px; border-radius: 8px; margin-top: 40px;">
        <h3 style="color: #d32f2f; margin-top: 0;">⚠️ 새 학기 데이터 초기화 구역</h3>
        <p style="color: #666; font-size: 14px;">다음 학기 세팅을 위해 <strong>기존 수강 신청 내역을 전체 삭제</strong>합니다.</p>
        <button id="resetDataBtn" style="background-color: #d32f2f; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer;">
            🔄 지난 신청 내역 전체 초기화
        </button>
    </div>

    <script>
        function toLocalDateTimeString(dateStr) {
            if (!dateStr) return '';
            const dateObj = new Date(dateStr);
            if (isNaN(dateObj.getTime())) return '';
            const tzOffset = dateObj.getTimezoneOffset() * 60000;
            return (new Date(dateObj.getTime() - tzOffset)).toISOString().slice(0, 16);
        }

        // 1. 로드 시 설정값 가져오기
        function loadSystemConfig() {
            fetch('/api/classes')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('mainTitle').value = data.titles?.mainTitle || '';
                    document.getElementById('subTitle').value = data.titles?.subTitle || '';
                    if(data.config?.startTime) document.getElementById('startTime').value = toLocalDateTimeString(data.config.startTime);
                    if(data.config?.endTime) document.getElementById('endTime').value = toLocalDateTimeString(data.config.endTime);
                    
                    const container = document.getElementById('classContainer');
                    container.innerHTML = '';
                    if (data.classes) data.classes.forEach(cls => addClassRow(cls));
                }).catch(err => console.error(err));
        }

        // 요일 변경 시 시간을 자동으로 채워주는 함수 (오류 수정 완료)
        function handleDayChange(selectElement) {
            const row = selectElement.parentElement;
            const startTimeInput = row.querySelector('.cls-start');
            const endTimeInput = row.querySelector('.cls-end');
            const selectedDay = selectElement.value;

            // '토요일(1교시)' 형태로 DB에서 읽어오는 값과 셀렉트의 value 매칭 보완
            if (['월', '화', '수', '목'].includes(selectedDay)) {
                startTimeInput.value = '15:30';
                endTimeInput.value = '16:10';
            } else if (selectedDay === '토1' || selectedDay === '토요일(1교시)') {
                startTimeInput.value = '08:50';
                endTimeInput.value = '10:20';
            } else if (selectedDay === '토2' || selectedDay === '토요일(2교시)') {
                startTimeInput.value = '10:30';
                endTimeInput.value = '12:00';
            } else {
                startTimeInput.value = '';
                endTimeInput.value = '';
            }
        }

            row
