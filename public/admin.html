<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>방과후 제어 관리자 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background-color: #f8fafc; color: #1e293b; }
        .box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h2 { margin-top: 0; color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 120px 1fr; gap: 10px; align-items: center; }
        input, select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 14px; }
        .btn { padding: 10px 15px; background: #2563eb; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn:hover { background: #1d4ed8; }
        .btn-add { background: #10b981; margin-bottom: 15px; }
        .btn-add:hover { background: #059669; }
        .btn-save { background: #ef4444; width: 100%; font-size: 16px; padding: 15px; margin-bottom: 25px; }
        .btn-save:hover { background: #dc2626; }
        .class-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 10px; align-items: center; background: #f1f5f9; padding: 10px; border-radius: 6px; }
        .btn-del { background: #b91c1c; padding: 6px 10px; }
        
        .live-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .live-table th, .live-table td { border: 1px solid #cbd5e1; padding: 10px; text-align: center; }
        .live-table th { background-color: #e2e8f0; color: #334155; }
        .live-table tr:hover { background-color: #f1f5f9; }
        .btn-kick { background-color: #dc2626; color: white; padding: 4px 8px; font-size: 12px; border-radius: 4px; }
        .btn-kick:hover { background-color: #991b1b; }
        .btn-reset-all { background-color: #475569; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <h1>🛠️ 방과후 학교 관리자 제어탑</h1>
    
    <div class="box">
        <h2>1. 전광판 타이틀 및 운영 시간 조율</h2>
        <div class="form-grid">
            <label>메인 타이틀</label>
            <input type="text" id="mainTitle" value="방과후 학교">
            <label>서브 타이틀</label>
            <input type="text" id="subTitle" value="수강 신청 시스템">
            <label>신청 시작 시간</label>
            <input type="datetime-local" id="startTime">
            <label>신청 마감 시간</label>
            <input type="datetime-local" id="endTime">
        </div>
    </div>

    <div class="box">
        <h2>2. 개설 강좌 편집 및 인원제한 제어</h2>
        <button class="btn btn-add" onclick="addClassRow()">➕ 강좌 추가</button>
        <div id="classContainer"></div>
    </div>

    <button class="btn btn-save" onclick="saveAllSettings()">💾 위 시스템 설정 일괄 반영하기</button>

    <div class="box">
        <h2>📊 3. 실시간 수강 신청 현황 및 명단 관리</h2>
        <p style="font-size:13px; color:#64748b; margin: 0 0 15px 0;">* 학생들이 신청한 현황이 실시간으로 집계됩니다. 잘못 입력된 명단은 [삭제] 단추로 즉시 취소할 수 있습니다.</p>
        <table class="live-table">
            <thead>
                <tr>
                    <th>지정 학년</th>
                    <th>학생 이름</th>
                    <th>신청 강좌명</th>
                    <th>비밀번호(대조용)</th>
                    <th>신청 시각</th>
                    <th>관리 명령</th>
                </tr>
            </thead>
            <tbody id="liveListContainer">
                <tr>
                    <td colspan="6" style="color:#94a3b8;">신청된 데이터가 아직 없습니다.</td>
                </tr>
            </tbody>
        </table>
        <button class="btn btn-reset-all" onclick="resetAllRegistrations()">⚠️ 전체 신청내역 포맷(초기화)</button>
    </div>

<script>
    function loadCurrentSettings() {
        fetch('/api/classes')
            .then(res => res.json())
            .then(data => {
                if(data) {
                    document.getElementById('mainTitle').value = data.titles?.mainTitle || '방과후 학교';
                    document.getElementById('subTitle').value = data.titles?.subTitle || '수강 신청 시스템';
                    document.getElementById('startTime').value = data.config?.startTime || '';
                    document.getElementById('endTime').value = data.config?.endTime || '';
                    
                    const container = document.getElementById('classContainer');
                    container.innerHTML = '';
                    if(Array.isArray(data.classes)) {
                        data.classes.forEach(cls => addClassRow(cls.name, cls.day, cls.startTime, cls.endTime, cls.limit));
                    }
                }
                return fetch('/api/status');
            })
            .then(res => res.json())
            .then(regs => {
                renderLiveTable(regs);
            })
            .catch(err => console.error("데이터 로드 실패:", err));
    }

    function renderLiveTable(regs) {
        const container = document.getElementById('liveListContainer');
        if(!regs || regs.length === 0) {
            container.innerHTML = `<tr><td colspan="6" style="color:#94a3b8; padding:20px;">신청 내역이 비어 있습니다.</td></tr>`;
            return;
        }

        container.innerHTML = regs.map(r => {
            const localTime = new Date(r.timestamp).toLocaleString();
            return `
                <tr>
                    <td><strong>${r.studentId}</strong></td>
                    <td>${r.studentName}</td>
                    <td><span style="color:#2563eb; font-weight:bold;">${r.className}</span></td>
                    <td style="color:#94a3b8; font-size:12px;">${r.studentPassword || '없음'}</td>
                    <td style="color:#64748b; font-size:12px;">${localTime}</td>
                    <td>
                        <button class="btn btn-kick" onclick="kickStudent('${r.studentId}', '${r.studentName}', '${r.className}')">삭제</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function kickStudent(studentId, studentName, className) {
        if(!confirm(`[관리자 권한]\n${studentId} ${studentName} 학생의 [${className}] 강좌 신청을 강제로 삭제하시겠습니까?`)) return;

        fetch('/api/admin/kick', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ studentId, studentName, className })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            fetch('/api/status').then(res => res.json()).then(regs => renderLiveTable(regs));
        })
        .catch(err => alert("삭제 중 통신 오류가 발생했습니다."));
    }

    function addClassRow(name='', day='월요일', start='', end='', limit='20') {
        const container = document.getElementById('classContainer');
        const div = document.createElement('div');
        div.className = 'class-row';
        div.innerHTML = `
            <input type="text" class="cls-name" placeholder="강좌명" value="${name}">
            <select class="cls-day">
                <option value="월요일" ${day==='월요일'?'selected':''}>월요일</option>
                <option value="화요일" ${day==='화요일'?'selected':''}>화요일</option>
                <option value="수요일" ${day==='수요일'?'selected':''}>수요일</option>
                <option value="목요일" ${day==='목요일'?'selected':''}>목요일</option>
                <option value="금요일" ${day==='금요일'?'selected':''}>금요일</option>
            </select>
            <input type="text" class="cls-start" placeholder="13:00" value="${start}">
            <input type="text" class="cls-end" placeholder="14:30" value="${end}">
            <input type="number" class="cls-limit" placeholder="정원" value="${limit}">
            <button class="btn btn-del" onclick="this.parentElement.remove()">삭제</button>
        `;
        container.appendChild(div);
    }

    function saveAllSettings() {
        const mainTitle = document.getElementById('mainTitle').value.trim();
        const subTitle = document.getElementById('subTitle').value.trim();
        const startTime = document.getElementById('startTime').value;
        const endTime = document.getElementById('endTime').value;
        
        const rows = document.querySelectorAll('.class-row');
        const classes = [];
        
        rows.forEach(row => {
            const name = row.querySelector('.cls-name').value.trim();
            const day = row.querySelector('.cls-day').value;
            const startTime = row.querySelector('.cls-start').value.trim();
            const endTime = row.querySelector('.cls-end').value.trim();
            const limit = row.querySelector('.cls-limit').value.trim();
            
            if(name) {
                classes.push({ name, day, startTime, endTime, limit });
            }
        });

        fetch('/api/admin/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mainTitle, subTitle, startTime, endTime, classes })
        })
        .then(res => res.json())
        .then(data => {
            alert("설정 정보가 영구 독립 공간에 안전하게 저장되었습니다.");
        })
        .catch(err => alert("저장 에러가 발생했습니다."));
    }

    function resetAllRegistrations() {
        if(!confirm("⚠️ 경고!\n현재까지 접수된 모든 학생들의 수강 신청 내역을 완전히 리셋하시겠습니까?")) return;
        fetch('/api/admin/reset', { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            fetch('/api/status').then(res => res.json()).then(regs => renderLiveTable(regs));
        });
    }

    window.onload = loadCurrentSettings;
</script>
</body>
</html>
