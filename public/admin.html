<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>방과후 시스템 관리자 페이지</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        h1, h2 { color: #1e3a8a; }
        .admin-section { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        input[type="text"], input[type="datetime-local"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .class-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 5px; }
        .class-row input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #1e3a8a; color: white; border: none; padding: 12px 20px; font-size: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #172554; }
        .add-btn { background-color: #10b981; }
        .add-btn:hover { background-color: #059669; }
        .remove-btn { background-color: #ef4444; padding: 8px 12px; }
        .remove-btn:hover { background-color: #dc2626; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f1f5f9; color: #1e3a8a; }
    </style>
</head>
<body>

    <h1>🛠️ 방과후 학교 관리자 시스템</h1>
    <p>강좌 정보 설정, 신청 시간 통제, 신청 현황 확인을 관리합니다.</p>

    <div class="admin-section">
        <h2>🏷️ 메인 화면 제목 설정</h2>
        <label>대제목 (학교명 또는 소속)</label>
        <input type="text" id="mainTitle">
        <label>소제목 (학기 정보 및 안내)</label>
        <input type="text" id="subTitle">
    </div>

    <div class="admin-section">
        <h2>⏰ 수강 신청 기간 설정</h2>
        <label>신청 시작 시간</label>
        <input type="datetime-local" id="startTime">
        <label>신청 마감 시간</label>
        <input type="datetime-local" id="endTime">
    </div>

    <div class="admin-section">
        <h2>📚 방과후 강좌 구성 변경</h2>
        <div id="classContainer"></div>
        <button type="button" class="add-btn" id="addClassBtn">➕ 강좌 추가</button>
    </div>

    <div style="text-align: center; margin-bottom: 40px;">
        <button id="saveAllBtn" style="background-color: #2563eb; font-size: 18px; padding: 15px 40px; border-radius: 30px; box-shadow: 0 4px 10px rgba(37,99,235,0.3);">
            💾 위 시스템 설정 일괄 반영하기
        </button>
    </div>

    <div class="admin-section">
        <h2>📊 전체 학생 수강 신청 결과 명단</h2>
        <button id="refreshListBtn" style="background-color: #475569;">🔄 명단 실시간 새로고침</button>
        <button id="downloadExcelBtn" style="background-color: #047857; margin-left: 10px;">📥 엑셀(CSV) 결과 다운로드</button>
        <table>
            <thead>
                <tr>
                    <th>학년반</th>
                    <th>이름</th>
                    <th>신청 강좌</th>
                    <th>신청 시각</th>
                </tr>
            </thead>
            <tbody id="studentListTableBody">
                <tr><td colspan="4" style="text-align: center; color: #999;">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="admin-section" style="border: 1px solid #ff4d4d; background-color: #fff5f5; padding: 20px; border-radius: 8px; margin-top: 40px;">
        <h3 style="color: #d32f2f; margin-top: 0;">⚠️ 새 학기 데이터 초기화 구역</h3>
        <p style="color: #666; font-size: 14px;">다음 학기 세팅을 위해 <strong>기존 수강 신청 내역을 전체 삭제</strong>합니다.</p>
        <button id="resetDataBtn" style="background-color: #d32f2f; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer;">
            🔄 지난 신청 내역 전체 초기화
        </button>
    </div>

    <script>
        function toLocalDateTimeString(dateStr) {
            if (!dateStr) return '';
            const dateObj = new Date(dateStr);
            if (isNaN(dateObj.getTime())) return '';
            const tzOffset = dateObj.getTimezoneOffset() * 60000;
            return (new Date(dateObj.getTime() - tzOffset)).toISOString().slice(0, 16);
        }

        // 1. 로드 시 설정값 가져오기
        function loadSystemConfig() {
            fetch('/api/classes')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('mainTitle').value = data.titles?.mainTitle || '';
                    document.getElementById('subTitle').value = data.titles?.subTitle || '';
                    if(data.config?.startTime) document.getElementById('startTime').value = toLocalDateTimeString(data.config.startTime);
                    if(data.config?.endTime) document.getElementById('endTime').value = toLocalDateTimeString(data.config.endTime);
                    
                    const container = document.getElementById('classContainer');
                    container.innerHTML = '';
                    if (data.classes) data.classes.forEach(cls => addClassRow(cls));
                }).catch(err => console.error(err));
        }

        function addClassRow(data = {}) {
            const container = document.getElementById('classContainer');
            const row = document.createElement('div');
            row.className = 'class-row';
            row.innerHTML = `
                <input type="text" placeholder="강좌명" class="cls-name" value="${data.name || ''}" style="flex:2;">
                <input type="text" placeholder="요일" class="cls-day" value="${data.day || ''}" style="width:50px; text-align:center;">
                <input type="text" placeholder="시작(14:00)" class="cls-start" value="${data.startTime || ''}" style="width:90px; text-align:center;">
                <input type="text" placeholder="종료(15:30)" class="cls-end" value="${data.endTime || ''}" style="width:90px; text-align:center;">
                <span style="font-size:13px; color:#666;">정원:</span>
                <input type="text" placeholder="정원" class="cls-limit" value="${data.limit || ''}" style="width:50px; text-align:center;"> 명
                <button type="button" class="remove-btn" onclick="this.parentElement.remove()">❌ 삭제</button>
            `;
            container.appendChild(row);
        }

        document.getElementById('addClassBtn').addEventListener('click', () => addClassRow());

        // 2. 설정 일괄 반영하기 버튼 이벤트
        document.getElementById('saveAllBtn').addEventListener('click', () => {
            const classes = [];
            document.querySelectorAll('.class-row').forEach(row => {
                classes.push({
                    name: row.querySelector('.cls-name').value,
                    day: row.querySelector('.cls-day').value,
                    startTime: row.querySelector('.cls-start').value,
                    endTime: row.querySelector('.cls-end').value,
                    limit: row.querySelector('.cls-limit').value
                });
            });

            const payload = {
                mainTitle: document.getElementById('mainTitle').value,
                subTitle: document.getElementById('subTitle').value,
                startTime: document.getElementById('startTime').value ? new Date(document.getElementById('startTime').value).toISOString() : null,
                endTime: document.getElementById('endTime').value ? new Date(document.getElementById('endTime').value).toISOString() : null,
                classes: classes
            };

            fetch('/api/admin/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(resData => {
                if(resData.success) alert("🎉 설정 정보가 Supabase 클라우드 DB에 영구 보관되었습니다. 이제 컴퓨터를 꺼도 안전합니다.");
            }).catch(err => alert("저장 실패했습니다."));
        });

        // 3. 학생 신청자 실시간 리스트 로드
        function loadStudentList() {
            fetch('/api/status')
                .then(res => res.json())
                .then(list => {
                    const tbody = document.getElementById('studentListTableBody');
                    if(!Array.isArray(list) || list.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #999;">현재 등록된 신청 명단이 없습니다.</td></tr>`;
                        return;
                    }
                    tbody.innerHTML = list.map(s => `
                        <tr>
                            <td>${s.studentId || '-'}</td>
                            <td>${s.studentName || '-'}</td>
                            <td style="font-weight:bold; color:#1e3a8a;">${s.className || '-'}</td>
                            <td style="color:#777; font-size:13px;">${s.timestamp ? new Date(s.timestamp).toLocaleString() : '-'}</td>
                        </tr>
                    `).join('');
                }).catch(err => console.error(err));
        }

        document.getElementById('refreshListBtn').addEventListener('click', loadStudentList);

        // 4. CSV 결과 다운로드
        document.getElementById('downloadExcelBtn').addEventListener('click', () => {
            fetch('/api/status')
                .then(res => res.json())
                .then(list => {
                    if(!Array.isArray(list) || list.length === 0) return alert("다운로드할 데이터가 없습니다.");
                    let csvContent = "\uFEFF학년반,이름,신청강좌,신청시간\n";
                    list.forEach(s => {
                        csvContent += `"${s.studentId || ''}","${s.studentName || ''}","${s.className || ''}","${s.timestamp || ''}"\n`;
                    });
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.setAttribute("download", `방과후신청결과_${new Date().toLocaleDateString()}.csv`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                });
        });

        // 5. 초기화 기능
        document.getElementById('resetDataBtn').addEventListener('click', function() {
            if (!confirm("⚠️ 정말로 신청 내역을 모두 삭제하시겠습니까?")) return;
            fetch('/api/admin/reset', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    loadStudentList();
                }
            }).catch(err => alert("통신 오류가 발생했습니다."));
        });

        // 즉시 강제 로드
        loadSystemConfig();
        loadStudentList();
    </script>
</body>
</html>
