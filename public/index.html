<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방과후 학교 수강신청</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #1e3a8a; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 15px; }
        .info-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-size: 14px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { font-weight: bold; color: #475569; }
        
        .form-group { display: flex; gap: 10px; margin-bottom: 25px; background: #edf2f7; padding: 15px; border-radius: 8px; align-items: center; }
        .form-group select, .form-group input { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        #studentGrade { width: 140px; text-align: center; }
        #studentName { width: 110px; text-align: center; }
        #studentPassword { flex: 1; }
        
        button.check-btn { background-color: #0f172a; color: white; padding: 10px 15px; font-size: 14px; font-weight: bold; border-radius: 6px; white-space: nowrap; cursor: pointer; }
        button.check-btn:hover { background-color: #334155; }

        .my-status-section { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: none; }
        .my-status-title { font-size: 16px; font-weight: bold; color: #166534; margin-top: 0; margin-bottom: 12px; }
        .my-class-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 15px; border-radius: 6px; border: 1px solid #dcfce7; margin-bottom: 8px; }
        
        .class-list { display: flex; flex-direction: column; gap: 15px; }
        .class-card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .class-card:hover { border-color: #3b82f6; box-shadow: 0 4px 12px rgba(59,130,246,0.08); }
        .class-info h3 { margin: 0 0 8px 0; color: #1e293b; font-size: 18px; }
        .class-meta { font-size: 13px; color: #64748b; display: flex; gap: 15px; }
        .class-status { text-align: right; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .count-badge { font-size: 14px; font-weight: bold; color: #1e3a8a; }
        .count-badge.full { color: #ef4444; }
        
        button { font-weight: bold; border-radius: 6px; cursor: pointer; border: none; transition: background 0.2s; }
        button.reg-btn { background-color: #2563eb; color: white; padding: 10px 20px; font-size: 14px; }
        button.reg-btn:hover { background-color: #1d4ed8; }
        button.reg-btn:disabled { background-color: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
        button.cancel-btn { background-color: #ef4444; color: white; padding: 6px 12px; font-size: 13px; }
        button.cancel-btn:hover { background-color: #dc2626; }
        
        .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #e2e8f0; color: #94a3b8; font-size: 14px; letter-spacing: 1px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="viewMainTitle">방과후 학교</h1>
    <div class="subtitle" id="viewSubTitle">수강 신청 시스템</div>

    <div class="info-box">
        <div class="info-row">
            <span class="info-label">⏱️ 신청 시작 시간:</span>
            <span id="viewStartTime">등록된 설정이 없습니다</span>
        </div>
        <div class="info-row">
            <span class="info-label">⌛ 신청 마감 시간:</span>
            <span id="viewEndTime">등록된 설정이 없습니다</span>
        </div>
    </div>

    <div class="form-group">
        <select id="studentGrade">
            <option value="">-- 학년 선택 --</option>
            <option value="유치원">유치원</option>
            <option value="1학년">1학년</option>
            <option value="2학년">2학년</option>
            <option value="3학년">3학년</option>
            <option value="4학년">4학년</option>
            <option value="5학년">5학년</option>
            <option value="6학년">6학년</option>
        </select>
        <input type="text" id="studentName" placeholder="학생 이름" maxlength="10">
        <input type="password" id="studentPassword" placeholder="비밀번호" maxlength="20">
        <button class="check-btn" onclick="checkMyStatus()">나의 신청내역 확인</button>
    </div>

    <div class="my-status-section" id="myStatusSection">
        <div class="my-status-title">🔔 나의 수강 신청 완료 내역</div>
        <div id="myClassListContainer"></div>
    </div>

    <h2>📚 개설 강좌 목록</h2>
    <div class="class-list" id="classListContainer">
        <p style="text-align: center; color: #999; padding: 20px;">강좌 정보를 불러오는 중입니다...</p>
    </div>

    <div class="footer">
        소주한국학교
    </div>
</div>

<script>
    let systemClasses = [];
    let registrations = [];

    // 안전 독립 비동기 호출 구조화로 렌더링 뻗는 현상 차단
    async function initSystem() {
        try {
            const classRes = await fetch('/api/classes');
            const classData = await classRes.json();
            if (classData) {
                document.getElementById('viewMainTitle').innerText = classData.titles?.mainTitle || '방과후 학교';
                document.getElementById('viewSubTitle').innerText = classData.titles?.subTitle || '수강 신청 시스템';
                
                // 시간 데이터 파싱 검증 추가
                const sTime = classData.config?.startTime;
                const eTime = classData.config?.endTime;
                document.getElementById('viewStartTime').innerText = sTime ? sTime.replace('T', ' ') : '미지정';
                document.getElementById('viewEndTime').innerText = eTime ? eTime.replace('T', ' ') : '미지정';
                
                systemClasses = Array.isArray(classData.classes) ? classData.classes : [];
            }
        } catch (e) {
            console.error("클래스 구조 파싱 에러:", e);
        }

        try {
            const statusRes = await fetch('/api/status');
            const regsData = await statusRes.json();
            registrations = Array.isArray(regsData) ? regsData : [];
        } catch (e) {
            console.error("신청 이력 파싱 에러:", e);
        }

        renderGlobalClasses();
    }

    function renderGlobalClasses() {
        const container = document.getElementById('classListContainer');
        if (!systemClasses || systemClasses.length === 0) {
            container.innerHTML = `<p style="text-align: center; color: #999; padding: 20px;">현재 개설된 방과후 강좌가 없습니다. 관리자 설정을 확인해 주세요.</p>`;
            return;
        }

        container.innerHTML = systemClasses.map(cls => {
            const currentCount = registrations.filter(r => r.className === cls.name).length;
            const limitCount = parseInt(cls.limit) || 0;
            const isFull = currentCount >= limitCount;

            return `
                <div class="class-card">
                    <div class="class-info">
                        <h3>${cls.name}</h3>
                        <div class="class-meta">
                            <span>📅 요일: <strong>${cls.day}</strong></span>
                            <span>⏰ 시간: ${cls.startTime} ~ ${cls.endTime}</span>
                        </div>
                    </div>
                    <div class="class-status">
                        <span class="count-badge ${isFull ? 'full' : ''}">
                            신청인원: ${currentCount} / ${limitCount} 명
                        </span>
                        <button class="reg-btn" ${isFull ? 'disabled' : ''} onclick="submitRegistration('${cls.name}')">
                            ${isFull ? '정원 마감' : '신청하기'}
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function checkMyStatus() {
        const grade = document.getElementById('studentGrade').value;
        const name = document.getElementById('studentName').value.trim();
        const password = document.getElementById('studentPassword').value.trim();
        
        const statusSection = document.getElementById('myStatusSection');
        const myContainer = document.getElementById('myClassListContainer');

        if (!grade || !name || !password) {
            alert("조회하려면 학년, 이름, 비밀번호를 모두 입력해 주세요.");
            statusSection.style.display = 'none';
            return;
        }

        const myRegs = registrations.filter(r => r.studentId === grade && r.studentName === name && r.studentPassword === password);
        
        if (myRegs.length > 0) {
            statusSection.style.display = 'block';
            myContainer.innerHTML = myRegs.map(r => `
                <div class="my-class-item">
                    <div><strong>${r.className}</strong> <span style="font-size:12px; color:#666; margin-left:10px;">(신청완료)</span></div>
                    <button class="cancel-btn" onclick="cancelRegistration('${r.className}')">신청 취소</button>
                </div>
            `).join('');
        } else {
            statusSection.style.display = 'none';
            alert("입력한 정보와 일치하는 수강 신청 내역이 없습니다.");
        }
    }

    function submitRegistration(className) {
        const studentId = document.getElementById('studentGrade').value;
        const studentName = document.getElementById('studentName').value.trim();
        const studentPassword = document.getElementById('studentPassword').value.trim();

        if (!studentId) return alert("학년을 선택해 주세요.");
        if (!studentName) return alert("이름을 입력해 주세요.");
        if (!studentPassword) return alert("비밀번호를 입력해 주세요.");

        fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ studentId, studentName, className, studentPassword })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            fetch('/api/status').then(res => res.json()).then(regs => {
                registrations = Array.isArray(regs) ? regs : [];
                renderGlobalClasses();
                const myRegs = registrations.filter(r => r.studentId === studentId && r.studentName === studentName && r.studentPassword === studentPassword);
                if(myRegs.length > 0) {
                    document.getElementById('myStatusSection').style.display = 'block';
                    document.getElementById('myClassListContainer').innerHTML = myRegs.map(r => `
                        <div class="my-class-item">
                            <div><strong>${r.className}</strong> <span style="font-size:12px; color:#666; margin-left:10px;">(신청완료)</span></div>
                            <button class="cancel-btn" onclick="cancelRegistration('${r.className}')">신청 취소</button>
                        </div>
                    `).join('');
                }
            });
        })
        .catch(err => alert("신청 중 오류가 발생했습니다."));
    }

    function cancelRegistration(className) {
        const studentId = document.getElementById('studentGrade').value;
        const studentName = document.getElementById('studentName').value.trim();
        const studentPassword = document.getElementById('studentPassword').value.trim();

        if(!confirm(`정말로 [ ${className} ] 강좌 신청을 취소하시겠습니까?`)) return;

        fetch('/api/cancel', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ studentId, studentName, className, studentPassword })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            fetch('/api/status').then(res => res.json()).then(regs => {
                registrations = Array.isArray(regs) ? regs : [];
                renderGlobalClasses();
                const myRegs = registrations.filter(r => r.studentId === studentId && r.studentName === studentName && r.studentPassword === studentPassword);
                if (myRegs.length > 0) {
                    document.getElementById('myStatusSection').style.display = 'block';
                    document.getElementById('myClassListContainer').innerHTML = myRegs.map(r => `
                        <div class="my-class-item">
                            <div><strong>${r.className}</strong> <span style="font-size:12px; color:#666; margin-left:10px;">(신청완료)</span></div>
                            <button class="cancel-btn" onclick="cancelRegistration('${r.className}')">신청 취소</button>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('myStatusSection').style.display = 'none';
                }
            });
        })
        .catch(err => alert("취소 처리 중 오류가 발생했습니다."));
    }

    window.onload = initSystem;
</script>
</body>
</html>
